server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → NestJS backend (internal Docker network)
    # The placeholder __API_URL__ is replaced at container startup
    # by docker-entrypoint.sh using the API_INTERNAL_URL env var.
    location /api/ {
        proxy_pass __API_URL__;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA — always return index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;
}
