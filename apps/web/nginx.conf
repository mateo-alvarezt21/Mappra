server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → NestJS backend (internal Docker network)
    # Uses a variable so nginx resolves the upstream lazily (per-request),
    # not at startup — avoids crash if the API container isn't ready yet.
    # 127.0.0.11 is Docker's internal DNS resolver.
    # Resolver público para que funcione tanto con hostnames internos de Docker
    # como con URLs públicas (ej: easypanel.host)
    resolver 8.8.8.8 valid=30s ipv6=off;

    location /api/ {
        set $api __API_URL__;
        proxy_pass $api;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_verify      off;
        proxy_set_header Host              $proxy_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA — always return index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;
}
